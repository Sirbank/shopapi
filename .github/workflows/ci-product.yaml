name: CI — Product Service

on:
  push:
    # Only trigger when product-service files change
    paths:
      - 'services/product-service/**'
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    paths:
      - 'services/product-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/product-service

jobs:
  build-and-push:
    name: Build, Push, Update
    runs-on: ubuntu-latest
    permissions:
      # Read repo contents
      contents: write    # write needed for the git commit step
      # Push packages to GHCR
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works in the update step
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Docker Buildx ───────────────────────────────────
      # Buildx enables advanced features: multi-platform, cache export
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Log in to GHCR ─────────────────────────────────────────
      # GITHUB_TOKEN is auto-generated by GitHub Actions — no setup needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Extract metadata (tags and labels) ─────────────────────
      # This generates tags automatically based on the event:
      #   - On push to main:     sha-abc1234, main
      #   - On push to feature:  sha-abc1234, feature-my-feature
      #   - On git tag v1.0.0:   sha-abc1234, v1.0.0, 1.0.0, 1.0, 1
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 5. Build and push image ───────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./services/product-service
          platforms: linux/arm64   # Mac Mini M1 is ARM64
          # Only push on real commits — NOT on pull requests
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Update dev overlay image tag ──────────────────────────
      # Only runs on pushes to main — not on feature branches or PRs
      - name: Update dev overlay with new image tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Build the short SHA tag (matches what docker/metadata-action generates)
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          echo "Updating dev overlay image tag to: $SHA_TAG"

          # Update product-service image tag in dev kustomization
          # sed replaces the newTag line for product-service specifically
          sed -i \
            "/name: product-service/{n;s/newTag:.*/newTag: $SHA_TAG/}" \
            k8s/overlays/dev/kustomization.yaml

          # Verify the change was made
          grep -A2 "name: product-service" k8s/overlays/dev/kustomization.yaml

          # Commit and push the change back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci(product): update dev image tag to $SHA_TAG [skip ci]"
          git push origin main

      # ── 7. Output summary ─────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | product-service |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Event | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
