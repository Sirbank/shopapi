apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifests
resources:
  - ../../base

# Apply namespace to ALL resources in this overlay
namespace: dev

# Environment-specific patches
# Note: no target: field when patch files contain multiple resources (---separated)
patches:
  - path: replicas-patch.yaml
  - path: resources-patch.yaml

# Image substitution — GitHub Actions updates these newTag values automatically
# on every merge to main
images:
  - name: product-service
   newTag: latest
   newName: ghcr.io/sirbank/shopapi/product-service
  - name: order-service
    newTag: latest
    newName: ghcr.io/sirbank/shopapi/order-service

# Labels applied to all resources in this overlay
# commonLabels is deprecated — use labels with includeSelectors: false
labels:
  - pairs:
      environment: dev
      managed-by: argocd
    includeSelectors: false
